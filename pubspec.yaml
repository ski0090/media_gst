name: media_gst
description: GStreamer 기반 Flutter 미디어 플레이어 플러그인 (flutter_rust_bridge v2). 고성능 Zero-copy 비디오 렌더링을 지원합니다.
version: 1.0.0
homepage: https://github.com/ski0090/media_gst
repository: https://github.com/ski0090/media_gst
issue_tracker: https://github.com/ski0090/media_gst/issues
publish_to: none
environment:
  sdk: ^3.11.1
  flutter: ">=3.10.0"

# Add regular dependencies here.
dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.11.1
  rust_lib_media_gst:
    path: rust_builder
  native_toolchain_rust: ^1.0.3
  hooks: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.0.0
  test: ^1.25.6
  # Rust 크레이트를 flutter run/build 시 자동으로 컴파일·링킹하기 위한 빌드 훅 툴체인
  # hook/build.dart 에서 RustBuilder를 통해 사용됩니다. [ENV.md 섹션 2 참조]
  ffigen: ^8.0.0
  integration_test:
    sdk: flutter
